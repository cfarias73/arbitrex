<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arbitrex - Feed de Oportunidades</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;family=Space+Grotesk:wght@400;600&amp;family=Syne:wght@700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#895af6',
              dark: '#07050F',
              surface: '#1C1540',
              accent: '#A78BFA',
            },
            live: '#34D399',
          },
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
            syne: ['Syne', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          borderRadius: {
            'custom': '12px',
          }
        }
      }
    }
  </script>
<style data-purpose="animations">
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
    .animate-live {
      animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .glass-morphism {
      background: rgba(28, 21, 64, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .glow-purple {
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
    }
    /* Hide scrollbar for clean horizontal scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-[#07050F] text-white font-sans selection:bg-brand/30">
<!-- BEGIN: MainHeader -->
<header class="sticky top-0 z-50 bg-[#07050F]/80 backdrop-blur-md px-4 pt-6 pb-4 border-b border-white/5">
<div class="flex items-center justify-between">
<h1 class="text-2xl font-syne uppercase tracking-tight">Feed</h1>
<div class="flex items-center gap-2 bg-live/10 px-3 py-1 rounded-full border border-live/20" data-purpose="live-badge">
<span class="w-2 h-2 bg-live rounded-full animate-live"></span>
<span class="text-live text-[10px] font-bold tracking-widest font-mono">LIVE</span>
</div>
</div>
<!-- BEGIN: FilterBar -->
<nav class="mt-6 overflow-x-auto no-scrollbar flex items-center gap-3">
<button class="whitespace-nowrap bg-brand px-5 py-2 rounded-custom text-sm font-semibold">Todos</button>
<button class="whitespace-nowrap bg-brand-surface border border-white/10 px-5 py-2 rounded-custom text-sm text-white/70">Intra</button>
<button class="whitespace-nowrap bg-brand-surface border border-white/10 px-5 py-2 rounded-custom text-sm text-white/70">Inter</button>
<button class="whitespace-nowrap bg-brand-surface border border-white/10 px-5 py-2 rounded-custom text-sm text-white/70">≥7pts</button>
<button class="whitespace-nowrap bg-brand-surface border border-white/10 px-5 py-2 rounded-custom text-sm text-white/70">Volume</button>
</nav>
<!-- END: FilterBar -->
</header>
<!-- END: MainHeader -->
<!-- BEGIN: FeedContent -->
<main class="px-4 py-6 space-y-4 pb-24">
<!-- Card 1: Featured Opportunity -->
<article class="glass-morphism border border-[#8B5CF6] rounded-custom p-5 glow-purple relative overflow-hidden" data-purpose="featured-card">
<div class="flex justify-between items-start mb-4">
<div>
<span class="inline-block bg-brand/20 text-brand text-[10px] font-bold px-2 py-0.5 rounded border border-brand/30 mb-2">INTRA</span>
<h2 class="text-lg font-syne leading-tight">2024 Election: Pennsylvania</h2>
</div>
<div class="text-right">
<div class="text-live font-mono text-xl font-medium">+12.4</div>
<div class="text-white/40 text-[10px] font-mono mt-1">hace 2 min</div>
</div>
</div>
<div class="flex items-center justify-between mt-6">
<div class="flex -space-x-2">
<div class="w-8 h-8 rounded-full border-2 border-[#1c1540] bg-zinc-800 flex items-center justify-center text-[10px]">US</div>
<div class="w-8 h-8 rounded-full border-2 border-[#1c1540] bg-zinc-700 flex items-center justify-center text-[10px]">PA</div>
</div>
<button class="bg-brand hover:bg-brand-accent text-white px-4 py-2 rounded-custom text-xs font-bold transition-colors">
          Operar Ahora
        </button>
</div>
</article>
<!-- Card 2: Standard Opportunity -->
<article class="bg-brand-surface border border-white/5 rounded-custom p-5" data-purpose="standard-card">
<div class="flex justify-between items-start mb-4">
<div>
<span class="inline-block bg-cyan-500/20 text-cyan-400 text-[10px] font-bold px-2 py-0.5 rounded border border-cyan-500/30 mb-2">INTER</span>
<h2 class="text-lg font-syne leading-tight">Fed Rate Cut Sept</h2>
</div>
<div class="text-right">
<div class="text-brand font-mono text-xl font-medium">+5.2</div>
<div class="text-white/40 text-[10px] font-mono mt-1">hace 5 min</div>
</div>
</div>
<div class="flex items-center justify-between mt-6">
<div class="flex gap-2">
<div class="w-6 h-6 rounded-full bg-white/5 flex items-center justify-center">
<svg class="w-3 h-3 text-white/40" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="text-xs text-white/60 self-center">High Volatility</span>
</div>
<button class="text-white/60 border border-white/10 px-4 py-2 rounded-custom text-xs font-bold">
          Ver Detalles
        </button>
</div>
</article>
<!-- Card 3: Locked/Freemium -->
<article class="bg-brand-surface/50 border border-white/5 rounded-custom p-5 relative overflow-hidden" data-purpose="locked-card">
<!-- Content with Blur -->
<div class="blur-[3px] opacity-40 select-none pointer-events-none">
<div class="flex justify-between items-start mb-4">
<div>
<span class="inline-block bg-zinc-500/20 text-zinc-400 text-[10px] font-bold px-2 py-0.5 rounded border border-zinc-500/30 mb-2">HIDDEN</span>
<h2 class="text-lg font-syne leading-tight">Secret Market Movement</h2>
</div>
<div class="text-right">
<div class="text-zinc-500 font-mono text-xl font-medium">+??.?</div>
</div>
</div>
<div class="h-12 bg-white/5 rounded-md mt-4"></div>
</div>
<!-- Lock Overlay -->
<div class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-brand-dark/20">
<div class="bg-brand text-white text-[10px] font-black px-2 py-0.5 rounded-full mb-3 shadow-lg shadow-brand/20">PRO</div>
<svg class="w-8 h-8 text-brand-accent mb-2" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<p class="text-[10px] font-mono text-white/50">Disponible hace 12 min</p>
</div>
<div class="absolute bottom-4 left-5">
<div class="text-white/30 text-[10px] font-mono italic">hace 18 min</div>
</div>
</article>
</main>
<!-- END: FeedContent -->
<!-- BEGIN: BottomNav -->
<nav class="fixed bottom-0 left-0 right-0 bg-[#07050F]/95 backdrop-blur-xl border-t border-white/5 px-6 pt-3 pb-8 flex justify-between items-center z-50">
<!-- Feed Active -->
<a class="flex flex-col items-center gap-1 text-brand-accent" href="#">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 8h-2v2h2v-2zm0-4h-2v2h2V7zm0 8h-2v2h2v-2zm-4-8H7v2h4V7zm0 4H7v2h4v-2zm0 8H7v2h4v-2z"></path></svg>
<span class="text-[10px] font-semibold">Feed</span>
</a>
<!-- Alertas -->
<a class="flex flex-col items-center gap-1 text-white/40" href="#">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-[10px] font-semibold">Alertas</span>
</a>
<!-- Trade (Central Highlight) -->
<div class="relative -top-4">
<div class="absolute inset-0 bg-brand blur-xl opacity-20"></div>
<button class="bg-brand p-4 rounded-full shadow-lg shadow-brand/40 border-4 border-[#07050F]">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<!-- Stats -->
<a class="flex flex-col items-center gap-1 text-white/40" href="#">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-[10px] font-semibold">Stats</span>
</a>
<!-- Perfil -->
<a class="flex flex-col items-center gap-1 text-white/40" href="#">
<div class="w-6 h-6 rounded-full border border-white/20 bg-brand-surface overflow-hidden">
<img alt="Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmizg8eD8x3X99nghEDpBkaRWQm0ROACHail2_qiDuvNKWbaVHlvBKnkOBL9H7pWWyfyutKLsKdcDjpRlZzd1Luvy5q5xTk2cjj0yGoHpZ9g1Zg1lQHLj6OeQK5YOA-tGQ4TKqMcD13x2P9PRmBobksmZ8Ngd8igecsstDn08n9oD5oGdkbTmZStkPlC79muuXruVhv7NVhVBo9CxcRola9HDDvM7HYqgxuLJfey2vQsCvsf7UZuvon5i-PWrJtdRIjNhxmoahDVI"/>
</div>
<span class="text-[10px] font-semibold">Perfil</span>
</a>
</nav>
<!-- END: BottomNav -->
</body></html>
